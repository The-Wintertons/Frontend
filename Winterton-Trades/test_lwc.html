<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="chart" style="width: 800px; height: 400px;"></div>
    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            timeScale: {
             fixLeftEdge: false,
             fixRightEdge: false,
            }
        });
        const area = chart.addAreaSeries();
        const data = [];
        for(let i=0;i<100;i++) data.push({time: '2023-01-'+(i%28+1).toString().padStart(2,'0'), value: Math.random()});
        area.setData(data.map((d,i) => ({time: '2023-'+(Math.floor(i/28)+1).toString().padStart(2,'0')+'-'+(i%28+1).toString().padStart(2,'0'), value: Math.random()})));
        chart.timeScale().setVisibleLogicalRange({from: 0, to: 99});
    </script>
</body>
</html>
